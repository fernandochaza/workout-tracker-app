<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Browse Exercises</title>
  </head>

  <body>
    <form id="search-form" class="search-form">
      <div class="search-form__controls">
        <label for="search-input" class="sr-only">Search exercises</label>
        <input
          id="search-input"
          name="search-input"
          type="text"
          class="search-form__input"
          placeholder="Search exercises..."
        />
        <button id="search-button" type="button" class="search-form__button">
          Search
        </button>
      </div>

      <section class="search-form__filters" aria-labelledby="filters-title">
        <h2 id="filters-title" class="search-form__filters-title">Filters</h2>

        <div class="search-form__field">
          <label class="search-form__label" for="filter-body-part"
            >Body Part</label
          >
          <select
            id="filter-body-part"
            name="bodyPart"
            class="search-form__select"
          >
            <option value="">All</option>
          </select>
        </div>

        <div class="search-form__field">
          <label class="search-form__label" for="filter-target-muscle"
            >Target Muscle</label
          >
          <select
            id="filter-target-muscle"
            name="target"
            class="search-form__select"
          >
            <option value="">All</option>
          </select>
        </div>

        <div class="search-form__field">
          <label class="search-form__label" for="filter-equipment"
            >Equipment</label
          >
          <select
            id="filter-equipment"
            name="equipment"
            class="search-form__select"
          >
            <option value="">All</option>
          </select>
        </div>
      </section>

      <section class="search-form__results" aria-labelledby="results-title">
        <h2 id="results-title" class="search-form__filters-title">Results</h2>
        <p
          id="results-status"
          class="search-form__results-status"
          role="status"
        >
          Use Search to run text queries. Filter changes auto-apply when query
          is empty.
        </p>
        <ul id="results-list" class="results-list"></ul>
      </section>
    </form>
  </body>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="main.js"></script>
</html>
