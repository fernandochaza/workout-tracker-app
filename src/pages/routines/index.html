<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="./main.css" />

    <title>Routines - Workout Tracker</title>
  </head>

  <body>
    <main class="page-card">
      <div id="routines-list-view">
        <section class="routines-header">
          <h2>Routines</h2>
          <button id="btn-new-routine" class="btn-primary">
            + New Routine
          </button>
        </section>

        <section id="active-section" class="routine-section">
          <h2>Active Routines</h2>
          <div id="active-routines-list" class="routines-grid"></div>
        </section>

        <section
          id="inactive-section"
          class="routine-section"
          style="display: none"
        >
          <h2>Inactive Routines</h2>
          <div id="inactive-routines-list" class="routines-grid"></div>
        </section>

        <div id="empty-state" class="empty-state" style="display: none">
          <p>No routines yet. Create your first one!</p>
        </div>
      </div>

      <div id="routine-detail-view" style="display: none"></div>
    </main>
  </body>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="main.js"></script>
</html>
