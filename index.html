<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Workout Tracker home dashboard with today's sessions, active routines, and motivation."
    />
    <meta name="author" content="Fernando Chazarreta" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="stylesheet" href="/src/pages/home/main.css" />

    <title>Workout Tracker</title>
  </head>

  <body>
    <main class="page-card home-page">
      <section class="home-section" id="home-today-section">
        <div class="home-section__header">
          <h2>
            Today's Sessions
            <span id="home-today-day" class="home-today-day"></span>
          </h2>
        </div>
        <div class="grid" id="home-today-list"></div>
        <div
          id="home-today-empty"
          class="home-empty-state"
          style="display: none"
        >
          <p>No sessions scheduled for today.</p>
          <a href="/src/pages/routines/index.html">Go to Routines →</a>
        </div>
      </section>

      <section class="home-section" id="home-routines-section">
        <div class="home-section__header">
          <h2>Active Routines</h2>
          <a href="/src/pages/routines/index.html" class="home-section__link"
            >View All →</a
          >
        </div>
        <div class="grid" id="home-routines-list"></div>
        <div
          id="home-routines-empty"
          class="home-empty-state"
          style="display: none"
        >
          <p>No active routines yet.</p>
          <a href="/src/pages/routines/index.html">Create a Routine →</a>
        </div>
      </section>

      <section
        id="home-quote-section"
        class="home-section home-quote-section"
        style="display: none"
      >
        <h2 class="sr-only">Motivational Quote</h2>
        <div class="home-quote-section__header">
          <button
            id="home-quote-refresh"
            class="secondary home-quote-refresh"
            type="button"
            aria-label="Reload quote"
            title="Reload quote"
          >
            <svg
              class="home-quote-refresh__icon"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                d="M20 12a8 8 0 1 1-2.343-5.657"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M20 4v6h-6"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
        <blockquote class="home-quote">
          <p id="home-quote-text"></p>
          <footer id="home-quote-author"></footer>
        </blockquote>
      </section>
    </main>
  </body>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/pages/home/main.js"></script>
</html>
